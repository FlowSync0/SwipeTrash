name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: npm run build && npx electron-builder --mac --publish never
          - name: Windows
            os: windows-latest
            command: npm run build && npx electron-builder --win --publish never
          - name: Linux
            os: ubuntu-latest
            command: npm run build && npx electron-builder --linux --publish never

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwipeTrash-${{ matrix.name }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.exe
            release/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release delete "$TAG_NAME" --repo "$REPOSITORY" --yes || true
          mapfile -t assets < <(find artifacts -type f | sort)
          gh release create "$TAG_NAME" "${assets[@]}" \
            --repo "$REPOSITORY" \
            --title "SwipeTrash $TAG_NAME" \
            --notes "Desktop installers for macOS, Windows, and Linux. macOS and Windows builds are unsigned for now, so the OS may show a security warning on first launch."
